services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=https://bb.keti.eu.org
      - NEXT_PUBLIC_APP_URL=https://bb.keti.eu.org
      - NEXTAUTH_SECRET=ufZdI4ReTqpiWg+AGAEdxr8K+eRDsHNVXYlSC96AfRo=
      - DATABASE_URL=mysql://root:password@db:3306/hxb
      - SESSION_SECRET=ufZdI4ReTqpiWg+AGAEdxr8K+eRDsHNVXYlSC96AfRo=
      - COOKIE_SECRET=ufZdI4ReTqpiWg+AGAEdxr8K+eRDsHNVXYlSC96AfRo=
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=hxb
      - SEED_ON_EMPTY_DB=true
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=hxb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
