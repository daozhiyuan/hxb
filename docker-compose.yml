version: '3.8'

services:
  # MySQL service
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: nextn
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "6000:6000"
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/nextn
      - NEXTAUTH_SECRET=supersecretstring
      - NEXTAUTH_URL=http://localhost:6000
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  mysql-data: 