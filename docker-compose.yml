version: '3.8'

services:
  # MySQL service
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: nextn
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3005:3005"
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/nextn
      - NEXTAUTH_SECRET=supersecretstring
      - NEXTAUTH_URL=http://localhost:3005
      - NODE_ENV=production
      - ENCRYPTION_KEY=your_32byte_strong_encryption_key_here
      - OLD_ENCRYPTION_KEY=your_optional_old_encryption_key
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backup service
  backup:
    image: mysql:8.0
    volumes:
      - mysql-data:/var/lib/mysql:ro
      - ./backups:/backups
    environment:
      - MYSQL_PWD=password
    command: >
      bash -c '
      while true; do
        BACKUP_FILE="/backups/nextn_$$(date +"%Y%m%d_%H%M%S").sql";
        mysqldump -h db -u root nextn > $$BACKUP_FILE;
        echo "数据库备份完成: $$BACKUP_FILE";
        find /backups -name "nextn_*.sql" -type f -mtime +7 -delete;
        echo "已删除7天前的旧备份";
        sleep 86400;
      done
      '
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data: 
  
networks:
  default:
    driver: bridge 